<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong AI - Modern Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff2a6d;
            --neon-blue: #05d9e8;
            --neon-yellow: #e2ff00;
            --bg-color: #01012b;
            --font-family: 'Outfit', sans-serif;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: var(--font-family);
            color: #fff;
        }
        
        #pongCanvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            z-index: 1;
        }
        
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            transition: opacity 0.5s ease-in-out;
        }
        
        #ui-layer.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .title {
            font-size: 5vw;
            font-weight: 700;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-blue);
        }
        
        button {
            background: rgba(1, 1, 43, 0.8);
            color: #fff;
            font-family: var(--font-family);
            font-size: 1.5rem;
            padding: 12px 35px;
            margin: 10px;
            border: 2px solid var(--neon-blue);
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(5, 217, 232, 0.3), inset 0 0 10px rgba(5, 217, 232, 0.3);
        }
        
        button:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue), inset 0 0 15px rgba(255, 255, 255, 0.5);
        }
        
        .controls-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
            pointer-events: none; /* Let clicks through gaps */
        }

        .controls-overlay > * {
            pointer-events: auto; /* Buttons are clickable */
        }
        
        .small-btn {
            font-size: 0.9rem;
            padding: 8px 15px;
            margin: 0;
            box-shadow: 0 0 5px rgba(5, 217, 232, 0.2);
            border-width: 1px;
        }
        
        #game-over-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 15;
            display: none;
            flex-direction: column;
            background: rgba(1, 1, 43, 0.9);
            padding: 40px 60px;
            border-radius: 12px;
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 30px rgba(255, 42, 109, 0.6);
            backdrop-filter: blur(8px);
        }
        
        .winner-text {
            font-size: 3.5rem;
            color: var(--neon-pink);
            text-shadow: 0 0 15px var(--neon-pink);
            margin-bottom: 30px;
            font-weight: 700;
            text-transform: uppercase;
        }

        #score-display {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20vw;
            z-index: 5;
            pointer-events: none;
            font-size: 5rem;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            opacity: 0.8;
        }

        .score-left { color: var(--neon-pink); }
        .score-right { color: var(--neon-blue); }

        /* Classic Theme Overrides via CSS Classes */
        body.classic-theme #score-display {
            text-shadow: none;
            font-family: monospace;
        }
        body.classic-theme .score-left, body.classic-theme .score-right {
            color: white;
        }
        body.classic-theme button {
            border-color: white;
            color: white;
            box-shadow: none;
            background: black;
            border-radius: 0;
        }
        body.classic-theme button:hover {
            background: white;
            color: black;
        }
        body.classic-theme #game-over-overlay {
            border-color: white;
            box-shadow: none;
            background: black;
        }
        body.classic-theme .winner-text {
            color: white;
            text-shadow: none;
        }

        /* Controls Help Menu */
        .controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(1, 1, 43, 0.9);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 0 10px rgba(5, 217, 232, 0.2);
            pointer-events: auto;
            min-width: 220px;
            overflow: hidden;
        }

        .controls-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--neon-blue);
            user-select: none;
        }

        .controls-header span.toggle-icon {
            font-size: 0.8rem;
            transition: transform 0.3s;
        }

        .controls-body {
            margin-top: 10px;
            font-size: 0.9rem;
            line-height: 1.6;
            display: none;
            color: #ddd;
        }

        .controls-help.expanded .controls-body {
            display: block;
        }

        .controls-help.expanded .toggle-icon {
            transform: rotate(180deg);
        }

        .key {
            display: inline-block;
            background: rgba(5, 217, 232, 0.1);
            border: 1px solid var(--neon-blue);
            border-radius: 3px;
            padding: 2px 6px;
            margin: 0 2px;
            color: var(--neon-blue);
            font-family: monospace;
            font-size: 0.8rem;
        }

        body.classic-theme .controls-help {
            background: black;
            border-color: white;
            box-shadow: none;
        }
        body.classic-theme .controls-header, body.classic-theme .controls-body {
            color: white;
        }
        body.classic-theme .key {
            background: #222;
            border-color: #555;
            color: white;
        }
    </style>
</head>
<body>
    <div id="score-display">
        <div id="score-left" class="score-left">0</div>
        <div id="score-right" class="score-right">0</div>
    </div>

    <div class="controls-overlay">
        <button id="btn-theme" class="small-btn">Theme: Modern</button>
        <button id="btn-mute" class="small-btn">Mute: Off</button>
        <button id="btn-speed" class="small-btn">Ramp Speed: On</button>
        <button id="btn-diff" class="small-btn">Difficulty: Medium</button>
        <button id="btn-mode" class="small-btn">Mode: AI vs AI</button>
    </div>

    <div class="controls-help" id="controls-menu">
        <div class="controls-header" id="controls-toggle">
            Controls & Hotkeys <span class="toggle-icon">▼</span>
        </div>
        <div class="controls-body">
            <div><span class="key">W</span> / <span class="key">S</span> : Left Paddle</div>
            <div><span class="key">↑</span> / <span class="key">↓</span> : Right Paddle</div>
            <hr style="border-color: rgba(5, 217, 232, 0.3); margin: 8px 0;">
            <div><span class="key">P</span> : Pause / Resume</div>
            <div><span class="key">M</span> : Toggle Mute</div>
            <div><span class="key">D</span> : Cycle Difficulty</div>
            <div><span class="key">Space</span> : Force Re-serve</div>
        </div>
    </div>

    <div id="ui-layer">
        <div class="title">Neon Pong</div>
        <button id="btn-play">Play Game</button>
    </div>

    <div id="game-over-overlay">
        <div class="winner-text" id="winner-display">Player Wins!</div>
        <button id="btn-restart">Restart</button>
    </div>

    <canvas id="pongCanvas"></canvas>
    
    <script src="pong.js"></script>
</body>
</html>
